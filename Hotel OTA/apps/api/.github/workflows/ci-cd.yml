name: Hotel OTA API CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'
  DATABASE_URL: ${{ secrets.HOTEL_OTA_DATABASE_URL }}
  REDIS_URL: ${{ secrets.HOTEL_OTA_REDIS_URL }}

jobs:
  # =========================================
  # LINT & TYPE CHECK
  # =========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
        working-directory: ./apps/api

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run type-check

  # =========================================
  # TEST
  # =========================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./apps/api

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hotel_ota_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
        working-directory: ./apps/api

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/api

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./apps/api

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: ./apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hotel_ota_test

      - name: Run tests
        run: npm test
        working-directory: ./apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hotel_ota_test
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api/coverage/lcov.info
          flags: unittests

  # =========================================
  # SECURITY
  # =========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./apps/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
        working-directory: ./apps/api

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/api

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # =========================================
  # BUILD DOCKER
  # =========================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./apps/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-hotel-ota
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================
  # DEPLOY TO RENDER
  # =========================================
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via Render API
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL_HOTEL_OTA }}
        shell: bash

  # =========================================
  # INTEGRATION TESTS
  # =========================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          # Wait for deployment
          sleep 30

          # Test health endpoint
          curl -f https://hotel-ota-api.onrender.com/health

          # Test booking sync endpoints
          curl -f https://hotel-ota-api.onrender.com/v1/booking-sync/health
        shell: bash

  # =========================================
  # NOTIFY
  # =========================================
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [deploy, integration]
    if: always()

    steps:
      - name: Slack notification (success)
        if: needs.deploy.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: 'C05XXXXXXXXX'
          slack-message: "✅ Hotel OTA API deployed successfully!\nCommit: ${{ github.sha }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Slack notification (failure)
        if: needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: 'C05XXXXXXXXX'
          slack-message: "❌ Hotel OTA API deployment failed!\nCommit: ${{ github.sha }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
