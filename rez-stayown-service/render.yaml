# render.yaml — StayOwn Hotel Service
# Deploy: render blueprint create (CLI) or push to GitHub + link on Render dashboard
#
# REQUIRED — set in Render dashboard > Service > Environment (not in this file):
#   MONGODB_URI              — MongoDB Atlas cluster for StayOwn
#   JWT_SECRET               — shared with other ReZ services (min 32 chars)
#   INTERNAL_SERVICE_TOKEN   — shared across all services (min 16 chars)
#   SENTRY_DSN              — Sentry monitoring (optional)

services:
  - type: web
    name: rez-stayown-service
    env: node
    region: singapore
    plan: free
    nodeVersion: '20'
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckThreshold: 3
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4015'
      - key: TRUST_PROXY_HOPS
        value: '1'
      - key: MONGODB_URI
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: CORS_ORIGIN
        value: 'https://admin.rez.money,https://corpperks.rez.money'
      - key: RATE_LIMIT_WINDOW_MS
        value: '900000'
      - key: RATE_LIMIT_MAX
        value: '100'
      # Service URLs for inter-service communication
      - key: HOTEL_SERVICE_URL
        fromService:
          name: rez-hotel-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: PROCUREMENT_SERVICE_URL
        fromService:
          name: rez-procurement-service
          envVarKey: RENDER_EXTERNAL_URL
