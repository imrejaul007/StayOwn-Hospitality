version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ota-postgres
    environment:
      POSTGRES_DB: hotel_ota
      POSTGRES_USER: ota_user
      POSTGRES_PASSWORD: ota_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ota-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
