# Habixo Service Docker Compose
version: '3.8'

services:
  habixo:
    build:
      context: ./rez-habixo-service
      dockerfile: Dockerfile
    container_name: habixo-api
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/habixo}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INTERNAL_SERVICE_TOKEN=${HABIXO_INTERNAL_TOKEN}
      - REZ_AUTH_SERVICE_URL=${REZ_AUTH_SERVICE_URL:-http://auth:4002}
      - REZ_PROFILE_SERVICE_URL=${REZ_PROFILE_SERVICE_URL:-http://profile:4002}
      - REZ_WALLET_SERVICE_URL=${REZ_WALLET_SERVICE_URL:-http://wallet:4004}
      - REZ_KARMA_SERVICE_URL=${REZ_KARMA_SERVICE_URL:-http://karma:4011}
      - REZ_PAYMENT_SERVICE_URL=${REZ_PAYMENT_SERVICE_URL:-http://payment:4001}
      - REZ_NOTIFICATION_SERVICE_URL=${REZ_NOTIFICATION_SERVICE_URL:-http://notifications:4011}
      - REZ_GAMIFICATION_SERVICE_URL=${REZ_GAMIFICATION_SERVICE_URL:-http://gamification:4007}
      - REZ_SEARCH_SERVICE_URL=${REZ_SEARCH_SERVICE_URL:-http://search:4003}
      - REZ_INTENT_GRAPH_URL=${REZ_INTENT_GRAPH_URL:-http://intent-graph:3001}
    depends_on:
      - mongo
      - redis
    networks:
      - rez-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Habixo MongoDB (for local development)
  mongo:
    image: mongo:7
    container_name: habixo-mongo
    restart: unless-stopped
    volumes:
      - habixo-mongo-data:/data/db
    ports:
      - "27018:27017"
    networks:
      - rez-network

  # Habixo Redis (for local development)
  redis:
    image: redis:7-alpine
    container_name: habixo-redis
    restart: unless-stopped
    volumes:
      - habixo-redis-data:/data
    ports:
      - "6380:6379"
    networks:
      - rez-network

volumes:
  habixo-mongo-data:
  habixo-redis-data:

networks:
  rez-network:
    driver: bridge
