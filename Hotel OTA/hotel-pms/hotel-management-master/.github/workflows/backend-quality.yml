name: backend-quality

on:
  pull_request:
    paths:
      - "backend/**"
      - "docs/**"
      - ".github/workflows/backend-quality.yml"
  push:
    branches: [ main, master ]
    paths:
      - "backend/**"
      - "docs/**"

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run build:check

      - name: Unit seam tests
        run: npm run test -- src/tests/unit/bookingModuleService.test.js src/tests/unit/billingModuleService.test.js src/tests/unit/apiVersioningMiddleware.test.js

      - name: Critical auth and booking integration gates
        run: npm run test:integration:gate

      - name: Validation audit
        run: npm run audit:validation

      - name: RBAC audit
        run: npm run audit:rbac

      - name: Baseline drift guard
        run: npm run verify:baseline
