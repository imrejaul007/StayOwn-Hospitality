services:
  - type: web
    name: hotel-ota-api
    runtime: node
    rootDir: apps/api
    buildCommand: cd ../../packages/database && npm install && npx prisma generate && cd ../../apps/api && npm install && npm run build
    startCommand: cd ../../packages/database && npm run migrate:deploy && cd ../../apps/api && node dist/index.js
    plan: starter
    autoDeploy: true
    envVars:
      # Database — set to your Render PostgreSQL internal URL
      - key: DATABASE_URL
        sync: false

      # Auth secrets — generate with: openssl rand -base64 48
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY
        value: "3600"
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_EXPIRY
        value: "2592000"
      - key: ADMIN_JWT_SECRET
        sync: false

      # SMS (MSG91)
      - key: MSG91_API_KEY
        sync: false
      - key: MSG91_SENDER_ID
        sync: false

      # Payment (Razorpay) — ALL THREE REQUIRED in production
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # REQUIRED: from Razorpay Dashboard → Settings → Webhooks
      # Without this, all Razorpay payment callbacks will be rejected at startup
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

      # Redis
      - key: REDIS_URL
        sync: false

      # ReZ Integration
      - key: REZ_API_KEY
        sync: false
      - key: REZ_API_BASE_URL
        sync: false
      - key: REZ_WEBHOOK_SECRET
        sync: false
      - key: REZ_AUTH_SERVICE_URL
        value: https://rez-auth-service.onrender.com
      - key: REZ_WALLET_SERVICE_URL
        value: https://rez-wallet-service-36vo.onrender.com
      - key: FINANCE_SERVICE_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: REZ_COIN_TO_RUPEE_RATE
        value: "0.50"

      # Hotel PMS Integration (hotel-management-master)
      - key: PMS_API_URL
        value: https://hotel-management-xcsx.onrender.com
      - key: PMS_WEBHOOK_SECRET
        sync: false
      - key: REZ_OTA_INTERNAL_TOKEN
        sync: false

      # AWS S3
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: ap-south-1

      # Email
      - key: SENDGRID_API_KEY
        sync: false

      # Frontend / Panel URLs (CORS origins in production)
      - key: FRONTEND_URL
        value: https://hotel-ota-web.onrender.com
      - key: HOTEL_PANEL_URL
        value: https://hotel-ota-hotel-panel.onrender.com
      - key: ADMIN_PANEL_URL
        value: https://hotel-ota-admin.onrender.com

      # App
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

  # ─── Hotel Panel (hotel staff / front-desk) ───────────────────────────────
  - type: web
    name: hotel-ota-hotel-panel
    runtime: node
    rootDir: apps/hotel-panel
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: starter
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hotel-ota-api.onrender.com
      - key: NEXT_PUBLIC_HOTEL_PANEL_URL
        value: https://hotel-ota-hotel-panel.onrender.com
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      - key: NEXT_PUBLIC_DEV_MODE
        value: "false"
      - key: NODE_ENV
        value: production

  # ─── OTA Web (guest-facing booking site) ─────────────────────────────────
  - type: web
    name: hotel-ota-web
    runtime: node
    rootDir: apps/ota-web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: starter
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hotel-ota-api.onrender.com
      - key: NODE_ENV
        value: production

  # ─── Admin Panel ──────────────────────────────────────────────────────────
  - type: web
    name: hotel-ota-admin
    runtime: node
    rootDir: apps/admin
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: starter
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hotel-ota-api.onrender.com
      - key: NODE_ENV
        value: production
